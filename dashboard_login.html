<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMU - Portal Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #990033;
            --accent: #FFB106;
            --glass: rgba(255, 255, 255, 0.95);
            --dark: #1a1a1a;
            --light: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--accent);
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.1); }
        }

        .login-card {
            background: var(--glass);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container img {
            width: 180px;
            margin-bottom: 15px;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .portal-header i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
            display: block;
        }

        .portal-header h1 {
            font-size: 1.8rem;
            color: var(--dark);
            font-weight: 700;
        }

        .portal-header p {
            color: #666;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 40px;
            color: #888;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #eee;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(153, 0, 51, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(153, 0, 51, 0.3);
        }

        .login-btn:hover {
            background: #80002b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(153, 0, 51, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        .back-link i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <div class="logo-container">
            <img src="images/t.jpg" alt="TMU Logo">
        </div>

        <div class="portal-header">
            <i id="portalIcon" class="fas fa-user-circle"></i>
            <h1 id="portalTitle">Portal Login</h1>
            <p>Access your university services</p>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="enrollment">Enrollment Number</label>
                <i class="fas fa-id-badge"></i>
                <input type="text" id="enrollment" placeholder="Enter Enrollment No" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="login-btn">Secure Login</button>
        </form>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');

        const config = {
            'fee': { title: 'Fee Portal', icon: 'fa-indian-rupee-sign' },
            'attendance': { title: 'Attendance Portal', icon: 'fa-user-check' },
            'marksheet': { title: 'Marksheet Portal', icon: 'fa-file-invoice' },
            'idcard': { title: 'Identity Card', icon: 'fa-id-card' },
            'greencard': { title: 'Green Card', icon: 'fa-address-card' },
            'library': { title: 'Library Portal', icon: 'fa-book' }
        };

        if (type && config[type]) {
            document.getElementById('portalTitle').innerText = config[type].title;
            document.getElementById('portalIcon').className = 'fas ' + config[type].icon;
            document.title = 'TMU - ' + config[type].title;
        }

        function handleLogin(e) {
            e.preventDefault();
            const enrollment = document.getElementById('enrollment').value;
            alert('Logging into ' + (config[type] ? config[type].title : 'Portal') + ' with Enrollment: ' + enrollment + '\n(Backend integration required for full functionality)');
        }
    </script>
</body>
</html>
